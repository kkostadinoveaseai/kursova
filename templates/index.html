<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бележки</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .container {
      width: 100%;
      max-width: 600px;
    }
    h1 {
      font-size: 1.8rem;
      color: #1a202c;
      margin-bottom: 24px;
    }
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }
    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      background: white;
    }
    .add-form input:focus {
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66,153,225,0.2);
    }
    .add-form button {
      padding: 10px 20px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    .add-form button:hover { background: #3182ce; }
    .error {
      background: #fff5f5;
      border: 1px solid #fc8181;
      color: #c53030;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .empty {
      text-align: center;
      color: #a0aec0;
      margin-top: 40px;
      font-size: 1rem;
    }
    .note-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .note-item {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .note-text { flex: 1; color: #2d3748; word-break: break-word; }
    .note-meta { font-size: 0.75rem; color: #a0aec0; white-space: nowrap; }
    .delete-btn {
      background: none;
      border: none;
      color: #fc8181;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .delete-btn:hover { background: #fff5f5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Моите бележки</h1>

    {% if error %}
      <div class="error">Грешка при свързване с базата данни: {{ error }}</div>
    {% endif %}

    <form class="add-form" action="/add" method="POST">
      <input type="text" name="content" placeholder="Напишете бележка..." maxlength="500" required />
      <button type="submit">Добави</button>
    </form>

    {% if notes %}
      <ul class="note-list">
        {% for note in notes %}
          <li class="note-item">
            <span class="note-text">{{ note[1] }}</span>
            <span class="note-meta">{{ note[2].strftime('%d.%m %H:%M') if note[2] else '' }}</span>
            <form action="/delete/{{ note[0] }}" method="POST">
              <button class="delete-btn" type="submit" title="Изтрий">&#x2715;</button>
            </form>
          </li>
        {% endfor %}
      </ul>
    {% else %}
      <p class="empty">Няма бележки все още.</p>
    {% endif %}
  </div>
</body>
</html>
